<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FITPULSE - Your Intelligent Health Companion</title>
    <!-- Google Fonts -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="min-h-screen flex items-center justify-center relative overflow-hidden">
        <!-- Background Orbs -->
        <div class="bg-orb cyan"></div>
        <div class="bg-orb blue"></div>
        <div class="bg-orb purple"></div>
        <div class="grid-bg"></div>

        <div class="relative z-10 flex flex-col items-center gap-8 w-full max-w-440 px-8">
            <!-- Header/Logo -->
            <div class="text-center">
                <div class="icon-box gradient-bg mx-auto mb-4">
                    <svg viewBox="0 0 30 30" fill="none" width="30" height="30">
                        <path d="M2 15h5l3-8 5 16 3-10 3 5h7" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path>
                    </svg>
                </div>
                <div class="gradient-text text-4xl font-extrabold tracking-widest syne-font">FITPULSE</div>
                <p class="text-muted-foreground text-sm mt-1 tracking-wide" style="color: var(--muted-foreground)">Your intelligent health companion</p>
            </div>

            <!-- Login / Register Card -->
            <div class="w-full glass-card">
                <div class="tabs">
                    <button class="tab-btn active" id="tab-login">Login</button>
                    <button class="tab-btn" id="tab-register">Register</button>
                </div>

                <!-- Login Form -->
                <form id="login-form">
                    <div class="form-group">
                        <label class="uppercase-label">Username</label>
                        <div class="input-wrapper">
                            <span class="input-icon">
                                <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><circle cx="12" cy="8" r="4"></circle><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"></path></svg>
                            </span>
                            <input type="text" id="login-username" class="input-field" placeholder="Enter username" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="uppercase-label">Password</label>
                        <div class="input-wrapper">
                            <span class="input-icon">
                                <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><rect x="3" y="11" width="18" height="11" rx="2"></rect><path d="M7 11V7a5 5 0 0110 0v4"></path></svg>
                            </span>
                            <input type="password" id="login-password" class="input-field" placeholder="Enter password" required>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary gradient-bg">Login &rarr;</button>
                    <div id="login-error" class="error-msg"></div>
                    <p class="text-center mt-1" style="color: var(--muted-foreground); font-size: 0.8rem; margin-top: 1rem;">
                        login: <strong style="color: white">login</strong> / <strong style="color: white">login</strong>
                    </p>
                </form>

                <!-- Register Form (Hidden by default) -->
                <form id="register-form" class="hidden">
                    <div class="form-group">
                        <label class="uppercase-label">Username</label>
                        <div class="input-wrapper">
                            <span class="input-icon">
                                <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><circle cx="12" cy="8" r="4"></circle><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"></path></svg>
                            </span>
                            <input type="text" id="reg-username" class="input-field" placeholder="Choose a username" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="uppercase-label">Password</label>
                        <div class="input-wrapper">
                            <span class="input-icon">
                                <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><rect x="3" y="11" width="18" height="11" rx="2"></rect><path d="M7 11V7a5 5 0 0110 0v4"></path></svg>
                            </span>
                            <input type="password" id="reg-password" class="input-field" placeholder="Create a password" required>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary gradient-bg">Register &rarr;</button>
                    <div id="register-error" class="error-msg"></div>
                </form>
            </div>
        </div>
    </div>
    
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
